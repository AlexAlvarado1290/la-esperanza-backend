services:
  postgres:
    image: postgres:16
    container_name: esperanza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: esperanza
      POSTGRES_PASSWORD: esperanza
      POSTGRES_DB: esperanza
    ports:
      - "5432:5432"
    volumes:
      - esperanza-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esperanza"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esperanza-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://esperanza:esperanza@postgres:5432/esperanza?schema=public
      JWT_SECRET: cambia-esto-en-produccion-por-favor
      JWT_EXPIRES_IN: 8h
      BCRYPT_ROUNDS: 10
      MAX_LOGIN_ATTEMPTS: 5
      LOGIN_LOCK_MINUTES: 10
      # SMS — toma el proveedor real del archivo .env del host (no hardcodear el token aquí).
      SMS_PROVIDER: ${SMS_PROVIDER:-stub}
      SMS_API_URL: ${SMS_API_URL:-https://api.smartla.net/smart-messaging-gw/notification}
      SMS_API_TOKEN: ${SMS_API_TOKEN:-}
      SMS_COUNTRY_ID: ${SMS_COUNTRY_ID:-502}
      # Permitir que el frontend en host (5173/4173) llame a la API.
      CORS_ORIGIN: http://localhost:5173,http://localhost:4173
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  esperanza-pgdata:
